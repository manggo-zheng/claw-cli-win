app:
  tooltip: "暗皮虾"
  icon_path: "anpi.ico"

header:
  title: "暗皮虾"
  initial_state: "stopped"
  states:
    stopped:
      text: "未启动"
      dot_color_key: "dot_stopped"
    starting:
      text: "启动中"
      dot_color_key: "dot_starting"
    auth:
      text: "连接中"
      dot_color_key: "dot_starting"
    running:
      text: "运行中"
      dot_color_key: "dot_running"
    working:
      text: "处理中"
      dot_color_key: "dot_working"
    error:
      text: "异常"
      dot_color_key: "dot_error"

themes:
  dark:
    bg: "#1A1B1E"
    border: "#2C2D31"
    text_main: "#E1E1E1"
    text_muted: "#6E6E6E"
    hover_bg: "#2A2B2F"
    exit_text: "#F35260"
    dot_stopped: "#9CA3AF"
    dot_starting: "#F59E0B"
    dot_running: "#22C55E"
    dot_working: "#3B82F6"
    dot_error: "#EF4444"
  light:
    bg: "#FFFFFF"
    border: "#F0F0F0"
    text_main: "#111827"
    text_muted: "#9CA3AF"
    hover_bg: "#F3F4F6"
    exit_text: "#DC2626"
    dot_stopped: "#6B7280"
    dot_starting: "#D97706"
    dot_running: "#16A34A"
    dot_working: "#2563EB"
    dot_error: "#DC2626"

svg_icons:
  start: '<svg viewBox="0 0 24 24" fill="none" stroke="{color}" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>'
  stop: '<svg viewBox="0 0 24 24" fill="none" stroke="{color}" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>'
  restart: '<svg viewBox="0 0 24 24" fill="none" stroke="{color}" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>'
  update: '<svg viewBox="0 0 24 24" fill="none" stroke="{color}" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>'
